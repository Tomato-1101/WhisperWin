name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: voicekey-mac.dmg
          - os: windows-latest
            artifact: voicekey-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller voicekey.spec --noconfirm

      - name: Package macOS (.dmg)
        if: matrix.os == 'macos-latest'
        run: |
          hdiutil create \
            -volname Voicekey \
            -srcfolder dist/voicekey.app \
            -ov -format UDZO \
            voicekey-mac.dmg

      - name: Package Windows (.zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist/voicekey -DestinationPath voicekey-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -name "voicekey-*" -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/voicekey-mac.dmg
            release/voicekey-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
